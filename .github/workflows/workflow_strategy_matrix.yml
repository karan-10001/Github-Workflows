name: QA UI Automation - Matrix Strategy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - test
          - staging

jobs:
  UI_Tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
        
    #This has to writen to manage the each iteration of matrix browser first time chrome then firefox 
    env:
      TEST_ENV: ${{ inputs.environment }}
      BROWSER: ${{ matrix.browser }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print matrix values
        run: |
          echo "Environment: $TEST_ENV"
          echo "Browser: $BROWSER"

      - name: Run UI automation tests
        run: |
          echo "Running UI tests"
          echo "Browser = $BROWSER"
          echo "Environment = $TEST_ENV"
          mkdir -p reports
          echo "UI tests executed on $BROWSER in $TEST_ENV" > reports/test-report.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-report-${{ matrix.browser }}
          path: reports/
