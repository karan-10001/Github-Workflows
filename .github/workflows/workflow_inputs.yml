name: workflow with manual inputs in workflow_dispatch

on: 
  workflow_dispatch:
    inputs:
        Myname:
            description: "Please enter your name"
            required: true 
            default: "github user"
            type: string
        Environment:
            description: "please enter the environment"
            required: true
            type: choice

            options:
                - INT
                - PROD
                - DEV
        firstNumber:
            description: "please enter first number"
            required: true
            default: 0
            type : number 
        secondNumber:
            description: "please enter second number"
            required: true
            default: 0
            type: number 


jobs:
  UI_Tests:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code 
        uses: actions/checkout@v4

      - name: print this job name
        run : echo "UI_Tests"

      - name: print the context
        run : echo "It will run all UI test cases"

      - name: print inputs variable
        run : echo "one of the input variable is ${{inputs.Myname}}"
        
      - name: add number
        id: sum
        run: echo "sum=$(( ${{inputs.firstNumber}} + ${{inputs.secondNumber}} ))" >> $GITHUB_OUTPUT 
  
      - name: display number
        run: echo " $${{ steps.sum.outputs.sum}}"

  API_Test:
    runs-on: ubuntu-latest

    steps: 
      - name: checkout code 
        uses: actions/checkout@v4
        
      - name: print this job name
        run: echo "API_test"

      - name: print the context 
        run: echo "It will run all api test cases"

      - name: print inputs other variable
        run: echo "one of the input variable is ${{inputs.Environment}}"
      
      - name: add number
        id: subtraction
        run: echo "minus=$(( ${{inputs.firstNumber}} - ${{inputs.secondNumber}} ))" >> $GITHUB_OUTPUT 
  
      - name: display number
        run: echo " $${{ steps.subtraction.outputs.minus}}"

