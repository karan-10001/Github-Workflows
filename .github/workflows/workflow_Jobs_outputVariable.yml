
name: workflow with jobs output variable

on:
    workflow_dispatch:
        inputs:
            number1:
                description: "Enter the first number"
                required: true
                default: '0'
                type: string
            number2:
                description: "Enter the second number"
                required: true
                default: '0'
                type: string

jobs:
    calculate_number:
        runs-on: ubuntu-latest

        outputs:
            addition : ${{steps.numberCalculation.outputs.add}}
            subraction: ${{steps.numberCalculation.outputs.subs}}
            multiplication: ${{steps.numberCalculation.outputs.multi}}

        steps:
            - name: calculate the numbers
              id: numberCalculation
              run: |
                echo "add= $(( ${{inputs.number1}} + ${{inputs.number2}}))" >> $GITHUB_OUTPUT
                echo "subs= $(( ${{inputs.number1}} - ${{inputs.number2}}))" >> $GITHUB_OUTPUT
                echo "multi= $(( ${{inputs.number1}} * ${{inputs.number2}}))" >> $GITHUB_OUTPUT

    Display_results:
        runs-on: ubuntu-latest
        needs: calculate_number

        steps:
            - name: Display the job output variables results
              run: |
                echo " addition result =  ${{needs.calculate_number.outputs.addition}}"
                echo "subtraction result = ${{needs.calculate_number.outputs.subraction}}"
                echo "multiplication result = ${{needs.calculate_number.outputs.multiplication}}"





